# MeetingGenie config — behavior is data, code stays put.
# Tune these the night before the demo without touching a .py file.

audio:
  sample_rate: 16000          # what whisper wants; sources resample to this
  vad_frame_ms: 60            # bumped from 30 - fewer audio callbacks/sec to reduce input overflow
  calibrate_seconds: 2.0      # measure noise floor at startup
  noise_floor_multiplier: 3.0 # silence threshold = measured floor * this (never hardcode 0.012 again)

transcribe:
  model: "small.en"           # accuracy > speed for accents; drop to base.en only if CPU can't keep up
  compute_type: "int8"
  # initial_prompt is built from glossary.terms below + these extras:
  prompt_extras: "This is a work meeting transcript."
  cpu_threads: 4              # bumped from 2 (fixed overflow but was slow). STILL A GUESS - tune against real core count.
  # Separate thresholds - loopback is a clean digital signal, mic picks up
  # real room noise/hum/distance. One shared number was wrong for the mic
  # and caused Whisper to hallucinate the initial_prompt back as "speech"
  # on pure noise. TUNE both against real recordings on the demo machine.
  mic_silence_rms: 300
  loopback_silence_rms: 150
  segment_silence_ms: 600     # how long someone must pause before we cut the utterance

glossary:
  fuzzy_threshold: 0.85       # auto-replace above this similarity
  terms:                      # fill with real vocab: names, cities, products, jargon
    - Hyderabad
    - Apexon
    - Devansh
    - Meesha
    - MeetingGenie

correction:
  confidence_gate: 0.88       # segments above this skip correction entirely
  echo_dedup_window_ms: 1000  # no-headphones mode: mic text matching loopback text within this window = echo, drop
  echo_dedup_similarity: 0.80

trigger:
  threshold: 3.0
  silence_ms: 2000            # the struggle signal
  min_words: 3
  max_words: 40
  signals:
    ends_with_question_mark: 2.0
    starts_with_interrogative: 2.0    # what why how when where who which
    starts_with_auxiliary: 1.5        # is/are/do/does/can/could/would + pronoun, SENTENCE START ONLY
    silence_after: 2.0
    user_filler_words: 1.0            # "um", "uh" from the me track
    length_in_range: 0.5
    tag_question: -3.0                # "...right?" "...make sense?"
    first_person_intent: -2.0         # "should I share my screen"
    user_already_answering: -5.0      # me track went hot -> kill

summarize:
  interval_seconds: 180       # open question for Meesha: 2 min or 5?
  max_bullets: 8
  model: "llama3.1:8b"
  ollama_url: "http://localhost:11434/api/chat"
  num_predict: 300
  system_prompt: >
    You maintain a running bullet-point summary of a live meeting. You'll get
    the previous summary (may be empty, if this is the first update) and the
    new raw conversation since then. Merge them into an updated summary of at
    most {max_bullets} bullets, covering the whole meeting so far, most
    important points first. Reply with ONLY a JSON object of this exact shape,
    nothing else: {{"bullets": ["point one", "point two", ...]}}

overlay:
  hotkey: "ctrl+shift+space"  # open question: check for Teams/Meet collisions
  stale_seconds: 20
  quiet_mode_default: false

mode:
  headphones: true            # false enables echo dedup + correlation gating (post-MVP)

output:

  meetings_dir: "meetings"

brain:
  host: "http://127.0.0.1:11434"
  model: llama3.2:latest
  temperature: 0.2
  top_p: 0.9
  num_predict: 180
  timeout: 120
  prewarm_prompt: "Reply only with OK."
  system_prompt: |
   You suggest short spoken answers during a live meeting. The transcript comes from
    imperfect speech recognition: proper nouns may be garbled, infer intent from context. Do not summarize the conversation till then for the user.
    Answer in sentences the user could say out loud. No preamble, no markdown.
logging:

  suggestions_file: "meetings/suggestions.json"
  meetings_dir: "meetings"
